<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE INVADERS CO-OP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --green:  #00ff88;
    --cyan:   #00d4ff;
    --yellow: #ffd700;
    --red:    #ff3c3c;
    --purple: #b44dff;
    --orange: #ff8c00;
    --dark:   #050a18;
    --panel:  #0a1428;
    --border: #1a3050;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── SCREENS ── */
  .screen { display:none; width:100%; height:100vh; position:absolute; top:0; left:0; }
  .screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; }

  /* ── LOBBY ── */
  #lobby {
    background: radial-gradient(ellipse at 50% 30%, #0a1f3a 0%, var(--dark) 70%);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 30px #00ff8888, 0 0 60px #00ff8844;
    margin-bottom: 6px;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .sub-logo {
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 8px;
    margin-bottom: 50px;
    opacity: 0.8;
  }
  @keyframes pulse-glow {
    0%,100% { text-shadow: 0 0 30px #00ff8888, 0 0 60px #00ff8844; }
    50%      { text-shadow: 0 0 50px #00ff88bb, 0 0 100px #00ff8866; }
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 14px 28px;
    border: 2px solid;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    margin: 6px;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:100%;height:100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.3s;
  }
  .btn:hover::before { left:100%; }

  .btn-green  { color:var(--green);  border-color:var(--green);  }
  .btn-green:hover  { background:#00ff8820; box-shadow:0 0 20px #00ff8844; }
  .btn-cyan   { color:var(--cyan);   border-color:var(--cyan);   }
  .btn-cyan:hover   { background:#00d4ff20; box-shadow:0 0 20px #00d4ff44; }
  .btn-yellow { color:var(--yellow); border-color:var(--yellow); }
  .btn-yellow:hover { background:#ffd70020; box-shadow:0 0 20px #ffd70044; }
  .btn-red    { color:var(--red);    border-color:var(--red);    }
  .btn-red:hover    { background:#ff3c3c20; }

  .btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:8px 0; }

  .input-group { display:flex; flex-direction:column; align-items:center; gap:10px; margin:20px 0; }
  .pixel-input {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    background: var(--panel);
    border: 2px solid var(--border);
    color: var(--cyan);
    padding: 12px 18px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    width: 220px;
    text-transform: uppercase;
  }
  .pixel-input:focus { border-color: var(--cyan); box-shadow: 0 0 12px #00d4ff44; }

  .room-code-display {
    font-size: 28px;
    color: var(--yellow);
    letter-spacing: 12px;
    padding: 16px 30px;
    border: 2px solid var(--yellow);
    background: #ffd70010;
    margin: 16px 0;
    animation: pulse-glow-y 1.5s ease-in-out infinite;
  }
  @keyframes pulse-glow-y {
    0%,100% { box-shadow: 0 0 10px #ffd70044; }
    50%      { box-shadow: 0 0 25px #ffd70088; }
  }

  .status-text { font-size: 9px; color: #ffffff66; margin: 8px 0; text-align:center; line-height:2; }
  .error-text  { font-size: 9px; color: var(--red); margin: 8px 0; }

  /* ── GAME CANVAS ── */
  #game-screen {
    background: #000;
    display: none;
    flex-direction: column;
  }
  #game-screen.active { display:flex; }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: linear-gradient(180deg, #050a18ee, transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 10;
    font-size: 9px;
  }
  .hud-section { display:flex; gap:16px; align-items:center; }
  .hud-val { color: var(--green); }
  .hud-label { color: #ffffff44; font-size: 7px; }

  /* ── CHAT ── */
  #chat-overlay {
    position: fixed;
    bottom: 8px; left: 8px;
    width: 300px;
    z-index: 20;
    pointer-events: none;
  }
  #chat-messages { display:flex; flex-direction:column; gap:3px; margin-bottom:6px; }
  .chat-msg {
    font-size: 8px;
    padding: 4px 8px;
    background: #00000088;
    border-left: 2px solid var(--cyan);
    animation: fade-in-msg 0.2s ease;
    max-width: 100%;
    word-break: break-all;
  }
  .chat-msg.p2 { border-left-color: var(--yellow); }
  @keyframes fade-in-msg { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:none; } }

  #chat-input-row {
    display: flex;
    gap: 6px;
    pointer-events: all;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #chat-input-row.visible { opacity: 1; }
  #chat-input {
    flex: 1;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    background: #000000cc;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 6px 8px;
    outline: none;
  }
  #chat-send {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    background: var(--cyan);
    color: #000;
    border: none;
    padding: 6px 8px;
    cursor: pointer;
  }

  /* ── SHOP OVERLAY ── */
  #shop-overlay, #bp-overlay {
    position: fixed;
    inset: 0;
    background: #000000cc;
    z-index: 30;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    overflow-y: auto;
  }
  #shop-overlay.open, #bp-overlay.open { display:flex; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--yellow);
    margin-bottom: 20px;
    letter-spacing: 3px;
  }

  .skin-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    max-width: 700px;
    width: 100%;
    margin-bottom: 20px;
  }
  .skin-card {
    border: 2px solid var(--border);
    background: var(--panel);
    padding: 12px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .skin-card:hover, .skin-card.selected { border-color: var(--cyan); background: #00d4ff10; }
  .skin-card.owned { border-color: var(--green); }
  .skin-card.equipped { border-color: var(--yellow); background: #ffd70010; }
  .skin-preview { width:40px; height:40px; }
  .skin-name { font-size: 6px; color: #fff; text-align:center; }
  .skin-cost { font-size: 6px; color: var(--yellow); }

  /* ── BP ── */
  .bp-track {
    display: flex;
    gap: 8px;
    max-width: 800px;
    width: 100%;
    overflow-x: auto;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .bp-tier {
    min-width: 70px;
    border: 2px solid var(--border);
    background: var(--panel);
    padding: 10px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .bp-tier.unlocked { border-color: var(--yellow); background: #ffd70010; }
  .bp-tier-num { font-size: 8px; color: var(--cyan); }
  .bp-tier-reward { font-size: 6px; color: #fff; text-align:center; }

  /* ── DIVIDER ── */
  #divider-line {
    position: fixed;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: linear-gradient(180deg, transparent, #1a3050 10%, #1a3050 90%, transparent);
    pointer-events: none;
    z-index: 5;
  }

  /* ── GAME OVER / LEVEL UP ── */
  #message-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000000aa;
    z-index: 40;
  }
  #message-overlay.show { display:flex; }
  .message-title {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 900;
    margin-bottom: 20px;
  }
  .message-sub { font-size: 10px; color: #ffffff88; margin-bottom: 30px; }

  /* ── MOBILE CONTROLS ── */
  #mobile-controls {
    position: fixed;
    bottom: 60px;
    left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 25;
    pointer-events: none;
  }
  .mobile-btn {
    width: 60px; height: 60px;
    border: 2px solid var(--green);
    background: #00ff8820;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    pointer-events: all;
    user-select: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-fire {
    border-color: var(--red);
    background: #ff3c3c20;
  }
  @media (max-width: 768px) {
    #mobile-controls { display:flex; }
  }

  /* Stars BG */
  #star-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .lobby-content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<!-- ══════════════ LOBBY ══════════════ -->
<div id="lobby" class="screen active">
  <div class="lobby-content">
    <div class="logo">SPACE INVADERS</div>
    <div class="sub-logo">CO-OP EDITION</div>

    <div id="lobby-main">
      <div class="btn-row">
        <button class="btn btn-green" onclick="startSolo()">▶ SOLO PLAY</button>
        <button class="btn btn-cyan"  onclick="showCreate()">＋ CREATE ROOM</button>
        <button class="btn btn-yellow" onclick="showJoin()">⊕ JOIN ROOM</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-yellow" onclick="openShop()">🛒 SHOP</button>
        <button class="btn btn-cyan"   onclick="openBP()">★ BATTLE PASS</button>
      </div>
      <div class="status-text" id="lobby-coins">Coins: <span id="lc-coins">0</span> &nbsp;|&nbsp; XP: <span id="lc-xp">0</span> &nbsp;|&nbsp; BP Tier: <span id="lc-tier">0</span>/10</div>
    </div>

    <div id="lobby-create" style="display:none; flex-direction:column; align-items:center;">
      <div class="status-text">Share this code with your friend!</div>
      <div class="room-code-display" id="display-code">-----</div>
      <div class="status-text" id="create-status">Waiting for player 2...</div>
      <button class="btn btn-red" onclick="backToLobby()">✕ CANCEL</button>
    </div>

    <div id="lobby-join" style="display:none; flex-direction:column; align-items:center;">
      <div class="status-text">Enter room code:</div>
      <div class="input-group">
        <input class="pixel-input" id="join-code" maxlength="5" placeholder="XXXXX" autocomplete="off">
        <div class="error-text" id="join-error"></div>
        <button class="btn btn-cyan" onclick="joinRoom()">JOIN GAME</button>
      </div>
      <button class="btn btn-red" onclick="backToLobby()">✕ BACK</button>
    </div>
  </div>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game-screen" class="screen">
  <canvas id="gameCanvas"></canvas>
</div>

<canvas id="star-canvas"></canvas>

<div id="hud">
  <div class="hud-section">
    <span><span class="hud-label">P1 SCORE </span><span class="hud-val" id="hud-score1">0</span></span>
    <span><span class="hud-label">LIVES </span><span class="hud-val" id="hud-lives1">♥♥♥</span></span>
    <span><span class="hud-label">COINS </span><span class="hud-val" id="hud-coins">0</span></span>
  </div>
  <div class="hud-section" style="flex-direction:column; gap:2px;">
    <span style="font-size:8px; color:var(--cyan); letter-spacing:2px;" id="hud-level">LEVEL 1</span>
  </div>
  <div class="hud-section" id="hud-p2-section" style="display:none;">
    <span><span class="hud-label">P2 SCORE </span><span class="hud-val" id="hud-score2">0</span></span>
    <span><span class="hud-label">LIVES </span><span class="hud-val" id="hud-lives2">♥♥♥</span></span>
  </div>
</div>

<div id="divider-line"></div>

<div id="chat-overlay">
  <div id="chat-messages"></div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="type message..." maxlength="60" autocomplete="off">
    <button id="chat-send" onclick="sendChat()">SEND</button>
  </div>
</div>

<div id="mobile-controls">
  <div style="display:flex; gap:10px;">
    <div class="mobile-btn" id="btn-left">◀</div>
    <div class="mobile-btn" id="btn-right">▶</div>
  </div>
  <div class="mobile-btn mobile-fire" id="btn-fire">🔥</div>
</div>

<!-- ══════════════ SHOP OVERLAY ══════════════ -->
<div id="shop-overlay">
  <div class="overlay-title">🛒 SHIP SHOP</div>
  <div class="status-text">Coins: <span id="shop-coins">0</span></div>
  <div class="skin-grid" id="skin-grid"></div>
  <div class="status-text" id="shop-msg" style="color:var(--cyan);"></div>
  <button class="btn btn-red" onclick="closeShop()">✕ CLOSE</button>
</div>

<!-- ══════════════ BATTLE PASS OVERLAY ══════════════ -->
<div id="bp-overlay">
  <div class="overlay-title">★ BATTLE PASS</div>
  <div class="status-text">XP: <span id="bp-xp">0</span> &nbsp;|&nbsp; Tier: <span id="bp-tier">0</span>/10</div>
  <div class="bp-track" id="bp-track"></div>
  <button class="btn btn-red" onclick="closeBP()">✕ CLOSE</button>
</div>

<!-- ══════════════ MESSAGE OVERLAY ══════════════ -->
<div id="message-overlay">
  <div class="message-title" id="msg-title">GAME OVER</div>
  <div class="message-sub" id="msg-sub">Score: 0</div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="restartGame()">↺ PLAY AGAIN</button>
    <button class="btn btn-yellow" onclick="backToLobbyFromGame()">⌂ MENU</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/ws`;
})();

const GAME_W = window.innerWidth;
const GAME_H = window.innerHeight;
const HALF_W = GAME_W / 2;

// ═══════════════════════════════════════════
// PLAYER DATA (localStorage)
// ═══════════════════════════════════════════
const DEFAULT_DATA = {
  coins: 500, xp: 0, bp_tier: 0,
  owned_skins: ['classic'], active_skin: 'classic',
  laser_color: 'green'
};

const SKINS = {
  classic:          { name:'Classic',          cost:0,    colors:['#00ff88','#00cc66','#ffffff'], style:'classic'  },
  retro_gold:       { name:'Retro Gold',        cost:300,  colors:['#ffd700','#ffaa00','#fff8dc'], style:'retro'    },
  cyber_neon:       { name:'Cyber Neon',        cost:500,  colors:['#00d4ff','#8800ff','#ff00ff'], style:'neon'     },
  galactic_stealth: { name:'Galactic Stealth',  cost:0,    colors:['#1e1e3c','#2a2a5a','#ffffff'], style:'stealth', bp_tier:10 },
  plasma_red:       { name:'Plasma Red',        cost:400,  colors:['#ff3232','#ff6600','#ffcc00'], style:'plasma'   },
  alien_parasite:   { name:'Alien Parasite',    cost:600,  colors:['#9600c8','#cc00ff','#6600aa'], style:'organic'  },
  '8bit_pixel':     { name:'8-Bit Pixel',       cost:250,  colors:['#ffff64','#ffcc00','#ff8800'], style:'8bit'     },
  crystal_void:     { name:'Crystal Void',      cost:700,  colors:['#b464ff','#8800ff','#ffffff'], style:'crystal'  },
  nebula_wing:      { name:'Nebula Wing',       cost:800,  colors:['#ff9632','#ff6400','#ffcc88'], style:'nebula'   },
  dark_matter:      { name:'Dark Matter',       cost:900,  colors:['#320050','#1a0028','#ff0000'], style:'dark'     },
};

const BP_TIERS = [
  { tier:1,  xp:0,    type:'skin',   reward:'classic',          label:'Classic Skin'       },
  { tier:2,  xp:100,  type:'coins',  reward:100,                label:'100 Coins'          },
  { tier:3,  xp:250,  type:'effect', reward:'neon_trail',       label:'Neon Trail FX'      },
  { tier:4,  xp:450,  type:'coins',  reward:200,                label:'200 Coins'          },
  { tier:5,  xp:700,  type:'laser',  reward:'rainbow',          label:'Rainbow Laser'      },
  { tier:6,  xp:1000, type:'coins',  reward:300,                label:'300 Coins'          },
  { tier:7,  xp:1400, type:'skin',   reward:'8bit_pixel',       label:'8-Bit Pixel Skin'   },
  { tier:8,  xp:1900, type:'shield', reward:'energy_field',     label:'Energy Shield'      },
  { tier:9,  xp:2500, type:'skin',   reward:'crystal_void',     label:'Crystal Void Skin'  },
  { tier:10, xp:3200, type:'skin',   reward:'galactic_stealth', label:'Galactic Stealth'   },
];

function loadData() {
  try { return { ...DEFAULT_DATA, ...JSON.parse(localStorage.getItem('si_data') || '{}') }; }
  catch { return { ...DEFAULT_DATA }; }
}
function saveData(d) { localStorage.setItem('si_data', JSON.stringify(d)); }

let playerData = loadData();

function addCoins(n) { playerData.coins += n; saveData(playerData); updateLobbyHUD(); }
function addXP(n) {
  playerData.xp += n;
  BP_TIERS.forEach(t => {
    if (t.tier > playerData.bp_tier && playerData.xp >= t.xp) {
      playerData.bp_tier = t.tier;
      if (t.type === 'skin' && !playerData.owned_skins.includes(t.reward))
        playerData.owned_skins.push(t.reward);
      if (t.type === 'coins') playerData.coins += t.reward;
      showFloatMsg(`BATTLE PASS T${t.tier} UNLOCKED: ${t.label}!`, '#ffd700');
    }
  });
  saveData(playerData);
}

function updateLobbyHUD() {
  document.getElementById('lc-coins').textContent = playerData.coins;
  document.getElementById('lc-xp').textContent = playerData.xp;
  document.getElementById('lc-tier').textContent = playerData.bp_tier;
}
updateLobbyHUD();

// ═══════════════════════════════════════════
// STARFIELD BACKGROUND
// ═══════════════════════════════════════════
const starCanvas = document.getElementById('star-canvas');
const sCtx = starCanvas.getContext('2d');
starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;
const STARS = Array.from({length:200}, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  s: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.5 + 0.1
}));
let starScroll = 0;
function drawStars() {
  sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
  sCtx.fillStyle = '#050a18';
  sCtx.fillRect(0,0,starCanvas.width,starCanvas.height);
  STARS.forEach(st => {
    const y = (st.y + starScroll * st.speed) % starCanvas.height;
    const b = Math.floor(100 + 155 * (st.s / 1.8));
    sCtx.fillStyle = `rgb(${b},${b},${b})`;
    sCtx.beginPath();
    sCtx.arc(st.x, y, st.s, 0, Math.PI*2);
    sCtx.fill();
  });
  starScroll++;
  requestAnimationFrame(drawStars);
}
drawStars();

// ═══════════════════════════════════════════
// NETWORKING
// ═══════════════════════════════════════════
let ws = null;
let myPlayerId = 1;
let roomCode = null;
let isMultiplayer = false;

function connectWS(cb) {
  ws = new WebSocket(WS_URL);
  ws.onopen = cb;
  ws.onmessage = e => handleServerMsg(JSON.parse(e.data));
  ws.onclose = () => { ws = null; };
  ws.onerror = err => console.error('WS error', err);
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleServerMsg(msg) {
  switch(msg.type) {
    case 'room_created':
      myPlayerId = msg.player_id;
      roomCode = msg.room_code;
      document.getElementById('display-code').textContent = roomCode;
      break;
    case 'room_joined':
      myPlayerId = msg.player_id;
      roomCode = msg.room_code;
      break;
    case 'player_joined':
      document.getElementById('create-status').textContent = 'Player 2 connected!';
      break;
    case 'start_game':
      isMultiplayer = true;
      startGameNow();
      break;
    case 'player_update':
      if (msg.player_id !== myPlayerId) updateOtherPlayer(msg.data);
      break;
    case 'chat':
      addChatMessage(msg.player_id, msg.text);
      break;
    case 'error':
      document.getElementById('join-error').textContent = msg.msg;
      break;
    case 'alien_killed':
      if (msg.from_player !== myPlayerId) removeAlienById(msg.alien_id);
      break;
    case 'bullet_fired':
      if (msg.from_player !== myPlayerId) addRemoteBullet(msg.data);
      break;
  }
}

// GAME ENGINE

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let gameLoop = null;
let level = 1;
let score = 0;
let coins = 0;
let lives = 3;
let invincible = 0;

// Player
let px = HALF_W / 2;
let py = GAME_H - 80;
const PSPEED = 5;
const BULLET_SPEED = 9;

// Bullets
let bullets = [];
let alienBullets = [];
let bossBullets = [];
let shootCooldown = 0;

// Aliens
let aliens = [];
let alienDir = 1;
let alienDropQueued = false;

// Barriers
let barriers = [];

// Boss
let boss = null;
let bossAnim = 0;

// Other player (multiplayer)
let otherPlayer = null;
let otherBullets = [];

// Keys & touch
const keys = {};
let touchLeft = false, touchRight = false, touchFire = false;

// Particles
let particles = [];
let floatMsgs = [];

function startGameNow() {
  document.getElementById('lobby').classList.remove('active');
  const gs = document.getElementById('game-screen');
  gs.classList.add('active');
  canvas.width  = GAME_W;
  canvas.height = GAME_H;
  document.getElementById('divider-line').style.height = GAME_H - 44 + 'px';
  if (isMultiplayer) {
    document.getElementById('hud-p2-section').style.display = 'flex';
  }
  level = 1; score = 0; coins = playerData.coins; lives = 3;
  initLevel();
  setupControls();
  gameRunning = true;
  if (gameLoop) cancelAnimationFrame(gameLoop);
  requestAnimationFrame(tick);
}

function stopGame() {
  gameRunning = false;
}

function initLevel() {
  aliens = [];
  alienBullets = [];
  bossBullets = [];
  alienDir = 1;
  boss = null;
  const zone = isMultiplayer ? HALF_W : GAME_W;
  const cols = 8, rows = 3;
  const spacingX = (zone - 80) / cols;
  const spacingY = 52;
  let id = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      aliens.push({
        id: id++, row: r, col: c,
        x: 50 + c * spacingX,
        y: 90 + r * spacingY,
        hp: 1,
        shootTimer: Math.random() * 300 + 60,
        anim: Math.floor(Math.random() * 60)
      });
    }
  }
  // Barriers
  barriers = [];
  const bcount = 4;
  const bw = zone / (bcount + 1);
  for (let i = 0; i < bcount; i++) {
    const segs = [];
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 8; c++)
        segs.push({ r, c, hp: 3 });
    barriers.push({ x: bw*(i+1) - 32, y: GAME_H - 160, segs });
  }
  if (level % 10 === 0) spawnBoss();
}

function spawnBoss() {
  boss = {
    x: (isMultiplayer ? HALF_W : GAME_W) / 2,
    y: 80,
    hp: 20 + level * 3,
    maxHp: 20 + level * 3,
    dir: 1,
    shootTimer: 40,
    anim: 0,
    points: 2000 + level * 200
  };
}

// ═══════════════════════════════════════════
// SKIN DRAWING
// ═══════════════════════════════════════════
function drawShip(x, y, skinId, size=28, alpha=1) {
  const skin = SKINS[skinId] || SKINS.classic;
  const [c1, c2, c3] = skin.colors;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  const s = size / 28;

  switch(skin.style) {
    case 'classic':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c3; ctx.fillRect(-3*s, -2*s, 6*s, 10*s);
      break;
    case 'retro':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c3;
      ctx.beginPath(); ctx.moveTo(0,-size/3); ctx.lineTo(-size/4,size/4); ctx.lineTo(size/4,size/4); ctx.closePath(); ctx.fill();
      break;
    case 'neon':
      ctx.strokeStyle = c1; ctx.lineWidth = 2*s;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/3,size/2); ctx.lineTo(size/3,size/2); ctx.closePath(); ctx.stroke();
      ctx.fillStyle = c2+'44';
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/3,size/2); ctx.lineTo(size/3,size/2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = c2; ctx.lineWidth = 1*s;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(0,size/2); ctx.stroke();
      break;
    case 'stealth':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/3); ctx.lineTo(-size/4,size/2); ctx.lineTo(size/4,size/2); ctx.lineTo(size/2,size/3); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c3;
      for(let i=0;i<5;i++){
        const sx=Math.sin(i*1.3)*10*s, sy=Math.cos(i*1.7)*8*s;
        ctx.fillRect(sx, sy, 1.5*s, 1.5*s);
      }
      break;
    case 'plasma':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
      for(let i=0;i<3;i++){
        ctx.fillStyle = `rgba(255,${100+i*50},0,${0.7-i*0.2})`;
        ctx.beginPath(); ctx.arc(0, size/2+i*6*s, (4-i)*s, 0, Math.PI*2); ctx.fill();
      }
      break;
    case 'organic':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/4); ctx.lineTo(-size/4,size/2); ctx.lineTo(size/4,size/2); ctx.lineTo(size/2,size/4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c2;
      ctx.beginPath(); ctx.arc(-8*s, 0, 4*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( 8*s, 0, 4*s, 0, Math.PI*2); ctx.fill();
      break;
    case '8bit': {
      const p = Math.max(1, Math.floor(5*s));
      const layout = ['  X  ','  X  ',' XXX ','XXXXX',' XXX '];
      layout.forEach((row,ri) => {
        [...row].forEach((ch,ci) => {
          if(ch==='X'){
            ctx.fillStyle = ri===3 ? c3 : c1;
            ctx.fillRect(-2.5*p+ci*p, -size/2+ri*p, p, p);
          }
        });
      });
      break;
    }
    case 'crystal':
      ctx.fillStyle = c1+'aa';
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/3,0); ctx.lineTo(-size/4,size/2); ctx.lineTo(size/4,size/2); ctx.lineTo(size/3,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = c3; ctx.lineWidth = 1.5*s;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/3,0); ctx.lineTo(-size/4,size/2); ctx.lineTo(size/4,size/2); ctx.lineTo(size/3,0); ctx.closePath(); ctx.stroke();
      break;
    case 'nebula':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
      for(let i=0;i<3;i++){
        ctx.strokeStyle = `rgba(255,${200-i*40},${100+i*30},${0.5-i*0.1})`;
        ctx.lineWidth = s;
        ctx.beginPath(); ctx.arc(0, i*8*s, size/4-i*4*s, 0, Math.PI*2); ctx.stroke();
      }
      break;
    case 'dark':
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(-6*s, 2*s, 4*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc( 6*s, 2*s, 4*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(-6*s, 2*s, 2*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc( 6*s, 2*s, 2*s, 0, Math.PI*2); ctx.fill();
      break;
    default:
      ctx.fillStyle = c1;
      ctx.beginPath(); ctx.moveTo(0,-size/2); ctx.lineTo(-size/2,size/2); ctx.lineTo(size/2,size/2); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawAlien(x, y, row, anim) {
  const cols = [['#00ff88','#00cc66'],['#ffd700','#cc9900'],['#b464ff','#8800ff']];
  const [c1,c2] = cols[Math.min(row, cols.length-1)];
  const leg = (Math.floor(anim/10) % 2) * 4 - 2;
  ctx.fillStyle = c1;
  ctx.fillRect(x-12, y-8, 24, 16);
  ctx.beginPath(); ctx.arc(x, y-12, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x-4, y-13, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4, y-13, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x-4, y-13, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4, y-13, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = c1; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x-12,y+5); ctx.lineTo(x-18,y+10+leg); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+12,y+5); ctx.lineTo(x+18,y+10+leg); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-6,y+8);  ctx.lineTo(x-10,y+14-leg); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+6,y+8);  ctx.lineTo(x+10,y+14-leg); ctx.stroke();
}

// ═══════════════════════════════════════════
// GAME TICK
// ═══════════════════════════════════════════
let lastTime = 0;
function tick(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(tick);
}

function update(dt) {
  const zone = isMultiplayer ? HALF_W : GAME_W;

  // Player movement
  if ((keys['ArrowLeft']||keys['a']||touchLeft) && px > 25) px -= PSPEED * dt;
  if ((keys['ArrowRight']||keys['d']||touchRight) && px < zone - 25) px += PSPEED * dt;
  if ((keys[' ']||keys['ArrowUp']||touchFire) && shootCooldown <= 0) {
    fireBullet();
    shootCooldown = 15;
  }
  if (shootCooldown > 0) shootCooldown -= dt;
  if (invincible > 0) invincible -= dt;

  // Move bullets
  bullets.forEach(b => { b.x += (b.dx||0)*dt; b.y -= BULLET_SPEED*dt; });
  bullets = bullets.filter(b => b.y > 0);
  otherBullets.forEach(b => { b.y -= BULLET_SPEED*dt; });
  otherBullets = otherBullets.filter(b => b.y > 0);

  alienBullets.forEach(b => b.y += 4*dt);
  alienBullets = alienBullets.filter(b => b.y < GAME_H);
  bossBullets.forEach(b => { b.x += b.dx*dt; b.y += b.dy*dt; });
  bossBullets = bossBullets.filter(b => b.y < GAME_H && b.x > 0 && b.x < zone);

  // Alien movement
  let edgeHit = false;
  aliens.forEach(a => {
    a.x += alienDir * (0.5 + level * 0.04) * dt;
    a.anim = (a.anim + dt) % 60;
    a.shootTimer -= dt;
    if (a.shootTimer <= 0) {
      a.shootTimer = Math.random() * 200 + 60;
      alienBullets.push({ x: a.x, y: a.y + 12 });
    }
  });
  if (aliens.some(a => a.x > zone - 20) || aliens.some(a => a.x < 20)) {
    edgeHit = true;
    alienDir *= -1;
    aliens.forEach(a => a.y += 18);
  }

  // Boss
  if (boss) {
    boss.x += boss.dir * (1.2 + level*0.08) * dt;
    if (boss.x > zone-50 || boss.x < 50) boss.dir *= -1;
    boss.anim = (boss.anim + dt) % 60;
    boss.shootTimer -= dt;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = 35;
      [-15,0,15].forEach(angle => {
        const rad = (90 + angle) * Math.PI / 180;
        bossBullets.push({ x:boss.x, y:boss.y+30, dx:Math.cos(rad)*3, dy:Math.sin(rad)*3 });
      });
    }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt; p.vy += 0.1*dt; });
  particles = particles.filter(p => p.life > 0);
  floatMsgs.forEach(m => { m.y -= 0.5*dt; m.life -= dt; });
  floatMsgs = floatMsgs.filter(m => m.life > 0);

  // ── Collisions ──
  // Bullets vs aliens
  bullets.forEach((b,bi) => {
    aliens.forEach((a,ai) => {
      if (Math.abs(b.x - a.x) < 16 && Math.abs(b.y - a.y) < 16) {
        spawnParticles(a.x, a.y, SKINS[playerData.active_skin].colors[0]);
        score += [100,200,300][Math.min(a.row,2)];
        addCoins([10,20,30][Math.min(a.row,2)]);
        addXP([10,20,30][Math.min(a.row,2)]);
        if (isMultiplayer) wsSend({ type:'alien_killed', alien_id: a.id });
        aliens.splice(ai,1);
        bullets.splice(bi,1);
      }
    });
    // vs boss
    if (boss && Math.abs(b.x - boss.x) < 45 && Math.abs(b.y - boss.y) < 28) {
      boss.hp--;
      spawnParticles(b.x, b.y, '#ff8800');
      bullets.splice(bi,1);
      if (boss.hp <= 0) {
        score += boss.points;
        addCoins(100 + level*10);
        spawnBigExplosion(boss.x, boss.y);
        boss = null;
      }
    }
    // vs barriers
    barriers.forEach(bar => {
      bar.segs.forEach((seg,si) => {
        const sx = bar.x + seg.c*8, sy = bar.y + seg.r*8;
        if (b.x > sx && b.x < sx+8 && b.y > sy && b.y < sy+8) {
          seg.hp--;
          if (seg.hp <= 0) bar.segs.splice(si,1);
          bullets.splice(bi,1);
        }
      });
    });
  });

  // Alien/boss bullets vs player
  const allEnemyBullets = [...alienBullets, ...bossBullets];
  allEnemyBullets.forEach((b,bi) => {
    if (invincible <= 0 && Math.abs(b.x - px) < 18 && Math.abs(b.y - py) < 18) {
      lives--;
      invincible = 90;
      spawnParticles(px, py, '#ff0000');
      alienBullets = alienBullets.filter(ab => ab !== b);
      bossBullets  = bossBullets.filter(bb => bb !== b);
      if (lives <= 0) { gameOver(); return; }
    }
  });

  // Alien/boss bullets vs barriers
  [...alienBullets, ...bossBullets].forEach(b => {
    barriers.forEach(bar => {
      bar.segs.forEach((seg,si) => {
        const sx = bar.x + seg.c*8, sy = bar.y + seg.r*8;
        if (b.x > sx && b.x < sx+8 && b.y > sy && b.y < sy+8) {
          seg.hp--;
          if (seg.hp <= 0) bar.segs.splice(si,1);
        }
      });
    });
  });

  // Aliens reach bottom
  if (aliens.some(a => a.y > GAME_H - 100)) { gameOver(); return; }

  // Level complete
  if (!aliens.length && !boss) {
    level++;
    showFloatMsg(`LEVEL ${level}!`, '#00ff88');
    initLevel();
    if (isMultiplayer) wsSend({ type:'level_up', level });
  }

  // Sync to server
  if (isMultiplayer) {
    wsSend({
      type:'player_update',
      data: { x:px, y:py, score, lives, skin:playerData.active_skin, bullets }
    });
  }

  updateHUD();
}

function fireBullet() {
  const laserColor = playerData.laser_color === 'rainbow' ? rainbowColor() : '#00ff88';
  const b = { x:px, y:py-20, color:laserColor };
  bullets.push(b);
  if (isMultiplayer) wsSend({ type:'bullet_fired', data:b });
}

function rainbowColor() {
  const t = Date.now() / 200;
  const r = Math.floor(127 + 127*Math.sin(t));
  const g = Math.floor(127 + 127*Math.sin(t+2));
  const b = Math.floor(127 + 127*Math.sin(t+4));
  return `rgb(${r},${g},${b})`;
}

function removeAlienById(id) {
  const idx = aliens.findIndex(a => a.id === id);
  if (idx !== -1) { spawnParticles(aliens[idx].x, aliens[idx].y, '#ffd700'); aliens.splice(idx,1); }
}

function addRemoteBullet(data) { otherBullets.push({ ...data }); }

function updateOtherPlayer(data) { otherPlayer = data; }

function spawnParticles(x, y, color) {
  for(let i=0;i<10;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*4+1;
    particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, color, life:30, maxLife:30 });
  }
}

function spawnBigExplosion(x, y) {
  for(let i=0;i<30;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*6+2;
    const colors = ['#ff8800','#ff3200','#ffcc00','#ff0000'];
    particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, color:colors[Math.floor(Math.random()*colors.length)], life:60, maxLife:60 });
  }
}

function showFloatMsg(text, color) {
  floatMsgs.push({ text, color, x: GAME_W/2, y: GAME_H/2, life:90, maxLife:90 });
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,GAME_W,GAME_H);
  const zone = isMultiplayer ? HALF_W : GAME_W;
  const offX = (myPlayerId === 2 && isMultiplayer) ? HALF_W : 0;

  // Clip to player zone
  ctx.save();
  ctx.beginPath();
  ctx.rect(offX, 0, zone, GAME_H);
  ctx.clip();

  // Planet
  drawPlanet(offX + zone/2, 110, level);

  // Barriers
  barriers.forEach(bar => drawBarrier(bar, offX));

  // Aliens
  aliens.forEach(a => drawAlien(a.x + offX, a.y, a.row, a.anim));

  // Boss
  if (boss) drawBoss(boss, offX);

  // Alien bullets
  alienBullets.forEach(b => {
    ctx.fillStyle = '#ff3c3c';
    ctx.fillRect(b.x + offX - 2, b.y - 6, 4, 10);
  });
  bossBullets.forEach(b => {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(b.x + offX, b.y, 5, 0, Math.PI*2); ctx.fill();
  });

  // Player bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.color || '#00ff88';
    ctx.fillRect(b.x + offX - 2, b.y, 4, 14);
  });
  otherBullets.forEach(b => {
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(b.x + (myPlayerId===1 ? HALF_W : 0) - 2, b.y, 4, 14);
  });

  // Player
  const alpha = (invincible > 0 && Math.floor(invincible/5)%2===0) ? 0.3 : 1;
  drawShip(px + offX, py, playerData.active_skin, 30, alpha);

  // Lives indicator
  for(let i=0;i<lives;i++) {
    drawShip(22 + i*24 + offX, GAME_H - 22, playerData.active_skin, 14, 0.8);
  }

  // Other player (on their side)
  if (isMultiplayer && otherPlayer) {
    const otherOff = myPlayerId === 1 ? HALF_W : 0;
    ctx.save();
    ctx.beginPath(); ctx.rect(otherOff, 0, HALF_W, GAME_H); ctx.clip();
    drawShip(otherPlayer.x + otherOff, otherPlayer.y, otherPlayer.skin || 'classic', 30, 0.9);
    ctx.restore();
  }

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Float messages
  floatMsgs.forEach(m => {
    ctx.save();
    ctx.globalAlpha = m.life / m.maxLife;
    ctx.fillStyle = m.color;
    ctx.font = "bold 16px 'Press Start 2P'";
    ctx.textAlign = 'center';
    ctx.fillText(m.text, m.x, m.y);
    ctx.restore();
  });

  ctx.restore(); // end clip
}

function drawPlanet(cx, cy, lv) {
  const themes = [
    { body:'#4878c8', atm:'#7aacff', ring:false },
    { body:'#c88c3c', atm:'#ffc870', ring:true  },
    { body:'#c83c3c', atm:'#ff7a7a', ring:false },
    { body:'#3cc8b4', atm:'#7affec', ring:false },
    { body:'#c8c850', atm:'#ffff90', ring:true  },
  ];
  const t = themes[Math.floor((lv-1)/5) % themes.length];
  const r = 50;
  // Glow
  const grd = ctx.createRadialGradient(cx, cy, r*0.5, cx, cy, r*1.8);
  grd.addColorStop(0, t.atm+'44'); grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, r*1.8, 0, Math.PI*2); ctx.fill();
  // Body
  const grad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
  grad.addColorStop(0, t.atm); grad.addColorStop(1, t.body);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  // Ring
  if (t.ring) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, 0.3);
    ctx.strokeStyle = t.atm+'88'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(0, 0, r*1.5, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawBarrier(bar, offX) {
  bar.segs.forEach(seg => {
    if (seg.hp <= 0) return;
    const colors = [['#003300','#005500','#00aa00'],['#004400','#006600','#00cc00'],['#005500','#009900','#00ff55']];
    const x = bar.x + seg.c*8 + offX;
    const y = bar.y + seg.r*8;
    ctx.fillStyle = colors[Math.min(2,3-seg.hp)][Math.min(2,seg.hp-1)];
    ctx.fillRect(x, y, 7, 7);
  });
}

function drawBoss(b, offX) {
  const x = b.x + offX, y = b.y;
  const pulse = Math.sin(b.anim / 60 * Math.PI * 2) * 4;
  // Body
  const grd = ctx.createRadialGradient(x, y+pulse, 5, x, y+pulse, 45);
  grd.addColorStop(0, '#ff5050'); grd.addColorStop(1, '#880000');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.ellipse(x, y+pulse, 45, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2;
  ctx.stroke();
  // Eye
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(x, y+pulse, 12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath(); ctx.arc(x, y+pulse, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x, y+pulse, 3, 0, Math.PI*2); ctx.fill();
  // HP bar
  ctx.fillStyle = '#333'; ctx.fillRect(x-40, y+32, 80, 7);
  const hp_ratio = b.hp / b.maxHp;
  ctx.fillStyle = hp_ratio > 0.5 ? '#00ff88' : hp_ratio > 0.25 ? '#ffd700' : '#ff3c3c';
  ctx.fillRect(x-40, y+32, Math.floor(80*hp_ratio), 7);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x-40, y+32, 80, 7);
  ctx.fillStyle = '#ff0000'; ctx.font = "8px 'Press Start 2P'";
  ctx.textAlign = 'center'; ctx.fillText('BOSS', x, y+50);
}

// GAME OVER / RESTART
// ═══════════════════════════════════════════
function gameOver() {
  gameRunning = false;
  const ov = document.getElementById('message-overlay');
  document.getElementById('msg-title').textContent = 'GAME OVER';
  document.getElementById('msg-title').style.color = '#ff3c3c';
  document.getElementById('msg-sub').textContent = `Score: ${score}  |  Level: ${level}  |  Coins earned`;
  ov.classList.add('show');
}

function restartGame() {
  document.getElementById('message-overlay').classList.remove('show');
  level = 1; score = 0; lives = 3; invincible = 0;
  coins = playerData.coins;
  bullets = []; alienBullets = []; bossBullets = [];
  particles = []; floatMsgs = [];
  initLevel();
  gameRunning = true;
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════
let chatOpen = false;
function addChatMessage(pid, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-msg${pid===2?' p2':''}`;
  div.textContent = `P${pid}: ${text}`;
  msgs.appendChild(div);
  while (msgs.children.length > 5) msgs.removeChild(msgs.firstChild);
  setTimeout(() => div.remove(), 10000);
}
function sendChat() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  if (isMultiplayer) {
    wsSend({ type:'chat', text });
    addChatMessage(myPlayerId, text);
  } else {
    addChatMessage(myPlayerId, text);
  }
  inp.value = '';
  toggleChat(false);
}
function toggleChat(force) {
  chatOpen = force !== undefined ? force : !chatOpen;
  const row = document.getElementById('chat-input-row');
  if (chatOpen) {
    row.classList.add('visible');
    document.getElementById('chat-input').focus();
  } else {
    row.classList.remove('visible');
    document.getElementById('chat-input').blur();
  }
}

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
function setupControls() {
  document.onkeydown = e => {
    if (chatOpen) {
      if (e.key === 'Enter') { sendChat(); e.preventDefault(); }
      if (e.key === 'Escape') { toggleChat(false); e.preventDefault(); }
      return;
    }
    keys[e.key] = true;
    if (e.key === 't' || e.key === 'T') toggleChat(true);
    if (e.key === ' ') e.preventDefault();
  };
  document.onkeyup = e => { keys[e.key] = false; };

  // Mobile touch
  const btnL = document.getElementById('btn-left');
  const btnR = document.getElementById('btn-right');
  const btnF = document.getElementById('btn-fire');
  const setTouch = (el, setTrue, setFalse) => {
    el.addEventListener('touchstart', e => { e.preventDefault(); setTrue(); }, {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); setFalse(); }, {passive:false});
    el.addEventListener('mousedown',  () => setTrue());
    el.addEventListener('mouseup',    () => setFalse());
  };
  setTouch(btnL, ()=>touchLeft=true,  ()=>touchLeft=false);
  setTouch(btnR, ()=>touchRight=true, ()=>touchRight=false);
  setTouch(btnF, ()=>touchFire=true,  ()=>touchFire=false);

  // Chat enter
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { sendChat(); e.preventDefault(); }
  });
}

// ═══════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════
function openShop() {
  document.getElementById('shop-coins').textContent = playerData.coins;
  const grid = document.getElementById('skin-grid');
  grid.innerHTML = '';
  Object.entries(SKINS).forEach(([id, skin]) => {
    const owned = playerData.owned_skins.includes(id);
    const equipped = playerData.active_skin === id;
    const card = document.createElement('div');
    card.className = `skin-card${equipped?' equipped':owned?' owned':''}`;

    // Mini canvas preview
    const previewCanvas = document.createElement('canvas');
    previewCanvas.width = 40; previewCanvas.height = 40;
    previewCanvas.className = 'skin-preview';
    const pCtx = previewCanvas.getContext('2d');
    // Draw mini ship preview
    pCtx.save(); pCtx.translate(20, 24);
    const c = skin.colors;
    pCtx.fillStyle = c[0];
    pCtx.beginPath(); pCtx.moveTo(0,-14); pCtx.lineTo(-10,14); pCtx.lineTo(10,14); pCtx.closePath(); pCtx.fill();
    pCtx.restore();

    const name = document.createElement('div');
    name.className = 'skin-name';
    name.textContent = skin.name;
    const cost = document.createElement('div');
    cost.className = 'skin-cost';
    if (equipped) { cost.textContent = 'EQUIPPED'; cost.style.color = '#ffd700'; }
    else if (owned) { cost.textContent = 'OWNED'; cost.style.color = '#00ff88'; }
    else if (skin.bp_tier) { cost.textContent = `BP T${skin.bp_tier}`; cost.style.color = '#b464ff'; }
    else { cost.textContent = `${skin.cost}🪙`; }

    card.append(previewCanvas, name, cost);
    card.onclick = () => shopSelect(id);
    grid.appendChild(card);
  });
  document.getElementById('shop-overlay').classList.add('open');
}

function shopSelect(id) {
  const skin = SKINS[id];
  const owned = playerData.owned_skins.includes(id);
  const msg = document.getElementById('shop-msg');
  if (owned) {
    playerData.active_skin = id;
    saveData(playerData);
    msg.textContent = `Equipped ${skin.name}!`;
    openShop(); // refresh
  } else if (skin.bp_tier) {
    msg.textContent = `Unlock via Battle Pass Tier ${skin.bp_tier}`;
  } else if (playerData.coins >= skin.cost) {
    playerData.coins -= skin.cost;
    playerData.owned_skins.push(id);
    playerData.active_skin = id;
    saveData(playerData);
    msg.textContent = `Bought & equipped ${skin.name}!`;
    openShop();
  } else {
    msg.textContent = `Need ${skin.cost - playerData.coins} more coins!`;
  }
}

function closeShop() { document.getElementById('shop-overlay').classList.remove('open'); updateLobbyHUD(); }

function openBP() {
  document.getElementById('bp-xp').textContent = playerData.xp;
  document.getElementById('bp-tier').textContent = playerData.bp_tier;
  const track = document.getElementById('bp-track');
  track.innerHTML = '';
  BP_TIERS.forEach(t => {
    const unlocked = playerData.bp_tier >= t.tier;
    const div = document.createElement('div');
    div.className = `bp-tier${unlocked?' unlocked':''}`;
    div.innerHTML = `
      <div class="bp-tier-num">T${t.tier}</div>
      <div style="font-size:12px;">${unlocked?'★':'☆'}</div>
      <div class="bp-tier-reward">${t.label}</div>
      <div style="font-size:6px;color:#ffffff44;">${t.xp} XP</div>
    `;
    track.appendChild(div);
  });
  document.getElementById('bp-overlay').classList.add('open');
}
function closeBP() { document.getElementById('bp-overlay').classList.remove('open'); }
